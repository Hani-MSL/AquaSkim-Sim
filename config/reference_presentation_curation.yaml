identifier: AQUASKIM-REF-PRESENT-01
title: Curated reference evidence for engineering presentation
policy: >-
  This curation is an evidence-selection and quality-control step. It does not
  execute a mission, modify the digital twin, create a Word report, build a
  delivery ZIP, or declare release readiness. Validated, boundary and
  controlled-failure material remain explicitly classified in every manifest.
figure_quality:
  min_width_px: 1100
  min_height_px: 700
media_quality:
  min_gif_frames: 72
  min_gif_duration_s: 8.0
  min_gif_width_px: 1280
  min_gif_height_px: 720
  min_mp4_duration_s: 8.0
  min_mp4_width_px: 1280
  min_mp4_height_px: 720
figures:
  - id: nominal_coverage
    source: outputs/figures/reference_nominal_fidelity_map.png
    title: Nominal coverage mission
    claim_class: validated
    report_priority: 1
