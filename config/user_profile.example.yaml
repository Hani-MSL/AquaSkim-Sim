# Local scientific experiment profile — copy is created automatically by the wizard.
# This example is safe to commit.  config/user_profile.yaml is Git-ignored.
profile:
  name: example_debris_loading
  schema_version: "3.0"
  experiment_kind: debris_loading
  notes: "No student, course, university or report-cover metadata belongs here."
overrides:
  mission:
    environment:
      length_m: 12.0
      width_m: 8.0
      water_depth_m: 0.50
  environment_model:
    debris:
      # Derived from areal density × basin area by the configuration wizard.
      count: 24
      mass_range_kg: [0.012, 0.032]
  experiment_model:
    debris_field:
      areal_density_items_m2: 0.25
      derived_discrete_item_count: 24
      mean_item_mass_kg: 0.022
    hopper:
      usable_volume_l: 4.0
      payload_mass_limit_kg: 0.80
      packing_factor: 0.62
