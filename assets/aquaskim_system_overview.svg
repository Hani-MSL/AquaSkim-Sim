<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
<title id="title">AquaSkim-Sim system overview</title>
<desc id="desc">A clean engineering overview of the simulated catamaran surface robot.</desc>
<rect width="900" height="560" rx="28" fill="#f4fbff"/>
<text x="450" y="56" text-anchor="middle" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#123047">AquaSkim-Sim</text>
<text x="450" y="92" text-anchor="middle" font-family="Segoe UI, Arial" font-size="17" fill="#456">Autonomous catamaran surface robot digital twin</text>
<g transform="translate(120 160)">
  <rect x="0" y="40" width="190" height="260" rx="55" fill="#4fb3d3" opacity="0.92"/>
  <rect x="470" y="40" width="190" height="260" rx="55" fill="#4fb3d3" opacity="0.92"/>
  <rect x="160" y="110" width="340" height="120" rx="20" fill="#d7eef7" stroke="#1f6b82" stroke-width="4"/>
  <path d="M190 90 L330 160 L190 250" fill="none" stroke="#f08a24" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M470 90 L330 160 L470 250" fill="none" stroke="#f08a24" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="275" y="130" width="110" height="70" rx="10" fill="#ffffff" stroke="#1f6b82" stroke-width="3"/>
  <circle cx="90" cy="330" r="30" fill="#123047"/>
  <circle cx="570" cy="330" r="30" fill="#123047"/>
  <text x="330" y="370" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#123047">twin hulls • V collector • differential thrusters</text>
</g>
<g font-family="Segoe UI, Arial" font-size="18" fill="#123047">
  <rect x="80" y="460" width="210" height="54" rx="12" fill="#e8f7ed" stroke="#49a167"/>
  <text x="185" y="494" text-anchor="middle">Hydrostatics</text>
  <rect x="345" y="460" width="210" height="54" rx="12" fill="#fff4e5" stroke="#d88a23"/>
  <text x="450" y="494" text-anchor="middle">3-DOF dynamics</text>
  <rect x="610" y="460" width="210" height="54" rx="12" fill="#eef0ff" stroke="#6574c4"/>
  <text x="715" y="494" text-anchor="middle">Autonomy + QA</text>
</g>
</svg>
